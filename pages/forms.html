<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="../images/hotels-fav.jpg" type="image/jpg">
        <link rel="stylesheet" href="../style.css">
        <title>Form</title>
    </head>

    <body>
        <h1 align="center">Login Form</h1>
        
        <div class="Form">
            <form action="../index.html" class="formContent">
                <div class="form1">
                    <label for="username" class="labels">Username: </label><br>
                    <input type="text" minlength="3" maxlength="10" placeholder="enter username" required id="username"><br>

                    <label for="password" class="labels">Password: </label><br>
                    <input type="password" minlength="8" placeholder="enter password" id="password"><br>
                    
                    <label for="email" class="labels">Email: </label><br>
                    <input type="email" id="email" placeholder="example@gmail.com" required><br>

                    <label for="gender" class="labels"></label>Gender:<br>
                    <label for="male" class="labels">Male: </label>
                    <input type="radio" id="male" name="gender">
                    <label for="female" class="labels">Female: </label>
                    <input type="radio" id="female" name="gender"> <br>
                    <br>
                    
                    <label for="bday" class="labels">Birthday</label> <br>
                    <input type="date" id="bday"><br>
                </div>
                <div class="form1">
                    <label for="phone" class="labels">Phone Number: </label><br>
                    <input type="tel" id="phone" pattern="[0-9]{4}-[0-9]{3}-[0-9]{4}" placeholder="09**-***-**32"><br>
                    <label for="quantity" class="labels">Order Quantity: </label><br>
                    <input type="number" id="quantity"><br>
                    
                    <label for="device" class="labels">Device being used: </label><br>
                    <label for="phone" class="labels">Phone</label>
                    <input type="checkbox" id="phone" name="device">
                    <label for="tablet" class="labels">Tablet</label>
                    <input type="checkbox" id="tablet" name="device"><br>
                    
                    <label for="note" class="labels">Give a note: </label>
                    <textarea id="note" rows="4" cols="20"></textarea> <br>

                    
                    <label for="file" class="labels">Import a File: </label><br>
                    <input type="file" id="file" accept="image/jpeg, image/png"> <br>
                    <br>
                    <input type="reset">
                    <input type="submit">
                </div>
            </form>
        </div>
        
    </body>
</html>
